<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>My Orders | Indo Heals</title>
  <link rel="icon" type="image/png" href="assets/indo-heals-logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="orders.css">
</head>
<body class="orders-page">

      <img src="assets/indo-heals-logo.png" alt="Indo Heals logo" />

    <nav class="orders-header-nav">
      <a href="index.html" class="btn-outline">Back to shop</a>
