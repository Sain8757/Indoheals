<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indo Heals Store Manager</title>
<link rel="icon" type="image/png" href="assets/indo-heals-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="admin-shell">
    <section id="loginPanel" class="login-screen">
      <form class="login-card" onsubmit="loginAdmin(event)">
        <img src="assets/indo-heals-logo.png" alt="Indo Heals logo">
        <span class="eyebrow">Store manager</span>
        <h1>Admin login</h1>
        <label>Email<input id="adminEmail" type="email" autocomplete="email" required></label>
        <label>Password<input id="adminPassword" type="password" autocomplete="current-password" required></label>
        <button class="primary-button" type="submit">Login</button>
        <p id="adminLoginMessage" class="form-message"></p>
      </form>
    </section>

    <section id="appPanel" class="manager-app" hidden>
      <header class="topbar">
        <div class="store-switcher">
          <button class="store-button" type="button">Store manager <span aria-hidden="true">v</span></button>
          <span class="divider"></span>
          <span class="live-pill"><span></span>Live</span>
        </div>
        <div class="top-actions">
          <button class="outline-button accent" type="button" onclick="showToast('AI helper is ready for your store notes.')">Ask AI</button>
          <a class="outline-button" href="index.html" target="_blank" rel="noreferrer">View site</a>
          <button class="outline-button" type="button" onclick="setView('products')">Edit website</button>
          <button class="icon-button" type="button" onclick="refreshCurrentView()" title="Refresh">Refresh</button>
        </div>
      </header>

      <aside class="sidebar">
        <nav class="main-nav" aria-label="Admin sections">
          <button class="active" data-view="overview" type="button"><span class="nav-icon"></span>Overview</button>
          <button data-view="orders" type="button"><span class="nav-icon"></span>Orders</button>
          <button data-view="products" type="button"><span class="nav-icon"></span>Products</button>
          <button data-view="appointments" type="button"><span class="nav-icon"></span>Appointments</button>
          <button data-view="discounts" type="button"><span class="nav-icon"></span>Discounts</button>
          <button data-view="customers" type="button"><span class="nav-icon"></span>Customers</button>
          <button data-view="analytics" type="button"><span class="nav-icon"></span>Analytics</button>
          <button data-view="emails" type="button"><span class="nav-icon"></span>Emails</button>
          <button data-view="settings-store" data-section="settings" type="button"><span class="nav-icon"></span>Settings</button>
          <div id="settingsNav" class="sub-nav">
            <button data-view="settings-store" type="button">Store details</button>
            <button data-view="settings-company" type="button">Company information</button>
            <button data-view="settings-payments" type="button">Payments</button>
            <button data-view="settings-shipping" type="button">Shipping</button>
            <button data-view="settings-checkout" type="button">Checkout</button>
            <button data-view="settings-taxes" type="button">Taxes</button>
            <button data-view="settings-invoices" type="button">Invoices</button>
          </div>
          <span class="nav-rule"></span>
          <button data-view="integrations" type="button"><span class="nav-icon"></span>Integrations</button>
          <button data-view="print" type="button"><span class="nav-icon"></span>Print on demand</button>
        </nav>
        <div class="sidebar-footer">
          <button type="button" onclick="showToast('Feedback noted for the store manager experience.')">Feedback</button>
          <button type="button" onclick="showToast('Help docs are coming soon.')">Help and resources</button>
          <button type="button" onclick="logoutAdmin()">Logout <span id="adminName"></span></button>
        </div>
      </aside>

      <section class="workspace">
        <div id="workspaceContent"></div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="admin.js?v=20260503-orders-otp"></script>
</body>
</html>
